<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Liaquat Electronics</title>

    <link rel="stylesheet" href="cart.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>
</head>
<body>

    <!-- NAVBAR -->

    <div class="navbar">

        <div class="nav-logo">
            <img src="logo.png" alt="Logo">
        </div>

        <div class="address">
            <i class="fa-solid fa-location-dot"></i>
            <span>Pakistan</span>
        </div>

        <div class="nav-search">

            <input
            type="text"
            placeholder="Search products..."
            class="search-input">

            <button class="search-btn">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>

        </div>

        <div class="nav-icons">

            <div class="cart active-cart">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cart-count">0</span>
            </div>

            <div class="signin">
                <i class="fa-regular fa-user"></i>
                <span>Sign In</span>
            </div>

        </div>

    </div>

    <!-- PANEL -->

    <div class="panel">

        <a href="index.html" class="menu-item">
            Home
        </a>

        <a href="products.html" class="menu-item">
            Products
        </a>

        <a href="contact.html" class="menu-item">
            Contact
        </a>

    </div>

    <!-- CART HEADER -->

    <section class="cart-header">

        <h1>Shopping Cart</h1>

        <p>
            Review your selected products.
        </p>

    </section>

    <!-- CART CONTENT -->

    <section class="cart-section">

        <!-- PRODUCTS WILL COME HERE -->
        <div class="cart-items" id="cart-items">

        </div>

        <!-- SUMMARY -->

        <div class="cart-summary">

            <h2>Order Summary</h2>

            <div class="summary-row">
                <span>Items</span>
                <span id="summary-items">0</span>
            </div>

            <div class="summary-row">
                <span>Total</span>
                <span id="summary-total">Rs. 00,000</span>
            </div>

            <button class="checkout-btn">
                Proceed To Checkout
            </button>

        </div>

    </section>

    <!-- FOOTER -->

    <footer class="footer">

        <p>
            © 2026 Liaquat Electronics.
            All Rights Reserved.
        </p>

    </footer>

    <script src="cart.js"></script>

</body>
</html>
